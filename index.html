<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hafidh Sabryan Alfatih — Editor · Desainer · Pembisnis</title>
<meta name="description" content="Portofolio pribadi Hafidh Sabryan Alfatih — pelajar, editor, desainer, dan pembisnis dari Indonesia. Menciptakan karya kreatif yang berdampak.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{
  --bg:#06080f;--bg-soft:#0a0d17;--bg-alt:#080b14;
  --surface:rgba(255,255,255,0.045);--surface-strong:rgba(255,255,255,0.085);
  --border:rgba(255,255,255,0.09);--border-strong:rgba(255,255,255,0.16);
  --white:#f3f5f9;--muted:#8b93a7;--muted-soft:#5c6478;
  --neon:#00e3ff;--blue:#3b6dff;
  --gradient:linear-gradient(135deg,#00e3ff 0%,#3b6dff 100%);
  --gradient-soft:linear-gradient(135deg,rgba(0,227,255,0.18),rgba(59,109,255,0.18));
  --font-display:'Space Grotesk',sans-serif;--font-body:'Inter',sans-serif;--font-mono:'JetBrains Mono',monospace;
  --container:1180px;--radius-lg:28px;--radius-md:18px;--radius-sm:10px;
  --ease:cubic-bezier(.16,.84,.44,1);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--white);font-family:var(--font-body);line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased;cursor:none;}
img{max-width:100%;display:block;}
a{color:inherit;text-decoration:none;}
ul{list-style:none;}
button{font-family:inherit;cursor:none;border:none;background:none;}
::selection{background:var(--neon);color:#000;}
::-webkit-scrollbar{width:10px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:linear-gradient(var(--neon),var(--blue));border-radius:10px;}

/* LOADER */
.loader{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity .6s var(--ease),visibility .6s var(--ease);}
.loader.hidden{opacity:0;visibility:hidden;pointer-events:none;}
.loader-inner{position:relative;width:96px;height:96px;display:flex;align-items:center;justify-content:center;}
.loader-ring{width:100%;height:100%;transform:rotate(-90deg);animation:spin 1.6s linear infinite;}
.loader-ring circle{fill:none;stroke:var(--neon);stroke-width:3;stroke-linecap:round;stroke-dasharray:170 100;filter:drop-shadow(0 0 8px rgba(0,227,255,.7));}
.loader-mark{position:absolute;font-family:var(--font-display);font-weight:700;font-size:15px;letter-spacing:2px;color:var(--white);}
@keyframes spin{to{transform:rotate(270deg);}}

/* CURSOR */
.cursor-dot,.cursor-ring{position:fixed;top:0;left:0;pointer-events:none;z-index:9998;border-radius:50%;transform:translate(-50%,-50%);}
.cursor-dot{width:6px;height:6px;background:var(--neon);box-shadow:0 0 8px var(--neon);}
.cursor-ring{width:34px;height:34px;border:1.5px solid rgba(0,227,255,.55);transition:width .25s var(--ease),height .25s var(--ease),border-color .25s var(--ease),background .25s var(--ease);}
.cursor-ring.hovered{width:54px;height:54px;background:rgba(0,227,255,.08);border-color:var(--neon);}
@media(hover:none),(max-width:900px){.cursor-dot,.cursor-ring{display:none;}body{cursor:auto;}a,button{cursor:pointer;}}

/* CANVAS */
#particles{position:fixed;inset:0;z-index:0;width:100%;height:100%;opacity:.5;pointer-events:none;}

/* LAYOUT */
.container{max-width:var(--container);margin:0 auto;padding:0 28px;position:relative;z-index:1;}
.section{padding:130px 0;position:relative;z-index:1;}
.section-alt{background:linear-gradient(180deg,transparent,rgba(255,255,255,.015) 10%,rgba(255,255,255,.015) 90%,transparent);}
.section-eyebrow{font-family:var(--font-mono);font-size:13px;letter-spacing:2.5px;text-transform:uppercase;color:var(--neon);margin-bottom:14px;display:block;}
.section-title{font-family:var(--font-display);font-size:clamp(28px,4vw,44px);font-weight:600;letter-spacing:-.5px;max-width:680px;margin-bottom:14px;}
.section-sub{color:var(--muted);max-width:560px;margin-bottom:54px;}
.reveal{opacity:0;transform:translateY(28px);transition:opacity .8s var(--ease),transform .8s var(--ease);transition-delay:calc(var(--delay,0)*90ms);}
.reveal.visible{opacity:1;transform:translateY(0);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:10px;padding:15px 28px;border-radius:100px;font-weight:600;font-size:15px;transition:transform .35s var(--ease),box-shadow .35s var(--ease),background .35s var(--ease),border-color .35s var(--ease);white-space:nowrap;}
.btn-primary{background:var(--gradient);color:#03101a;box-shadow:0 0 0 0 rgba(0,227,255,.5),0 12px 30px -10px rgba(0,227,255,.55);}
.btn-primary:hover{transform:translateY(-3px);box-shadow:0 16px 38px -8px rgba(0,227,255,.75);}
.btn-ghost{background:var(--surface);border:1px solid var(--border);color:var(--white);backdrop-filter:blur(12px);}
.btn-ghost:hover{border-color:var(--neon);background:rgba(0,227,255,.07);transform:translateY(-3px);}
.btn-small{padding:11px 20px;font-size:13.5px;}
.btn-link{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--white);padding-bottom:2px;border-bottom:1px solid var(--border-strong);transition:color .3s var(--ease),border-color .3s var(--ease),gap .3s var(--ease);}
.btn-link:hover{color:var(--neon);border-color:var(--neon);gap:11px;}

/* NAVBAR */
.nav{position:fixed;top:0;left:0;width:100%;z-index:100;padding:22px 0;transition:padding .4s var(--ease),background .4s var(--ease),border-color .4s var(--ease);border-bottom:1px solid transparent;}
.nav.scrolled{padding:13px 0;background:rgba(6,8,15,.7);backdrop-filter:blur(18px) saturate(140%);border-bottom:1px solid var(--border);}
.nav-inner{max-width:var(--container);margin:0 auto;padding:0 28px;display:flex;align-items:center;justify-content:space-between;gap:24px;}
.nav-logo{font-family:var(--font-display);font-weight:700;font-size:21px;letter-spacing:.5px;}
.nav-logo span{color:var(--neon);}
.nav-links{display:flex;align-items:center;gap:34px;margin:0 auto;}
.nav-links a{position:relative;font-size:14.5px;font-weight:500;color:var(--muted);transition:color .3s var(--ease);}
.nav-links a::after{content:'';position:absolute;left:0;bottom:-8px;width:0;height:1.5px;background:var(--gradient);transition:width .3s var(--ease);}
.nav-links a:hover{color:var(--white);}
.nav-links a:hover::after{width:100%;}
.nav-cta{flex-shrink:0;}
.nav-burger{display:none;flex-direction:column;gap:5px;width:26px;z-index:101;}
.nav-burger span{width:100%;height:2px;background:var(--white);border-radius:2px;transition:transform .35s var(--ease),opacity .35s var(--ease);}
.nav-burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.nav-burger.open span:nth-child(2){opacity:0;}
.nav-burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}

/* HERO */
.hero{position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:140px 24px 80px;overflow:hidden;}
.aurora{position:absolute;inset:0;z-index:0;overflow:hidden;}
.aurora-blob{position:absolute;border-radius:50%;filter:blur(90px);opacity:.55;animation:drift 18s ease-in-out infinite alternate;}
.blob-1{width:520px;height:520px;background:radial-gradient(circle,var(--neon),transparent 70%);top:-180px;left:-120px;}
.blob-2{width:460px;height:460px;background:radial-gradient(circle,var(--blue),transparent 70%);bottom:-160px;right:-100px;animation-delay:-6s;}
.blob-3{width:340px;height:340px;background:radial-gradient(circle,#7c5cff,transparent 70%);top:40%;left:50%;opacity:.35;animation-delay:-3s;}
@keyframes drift{0%{transform:translate(0,0) scale(1);}100%{transform:translate(60px,40px) scale(1.15);}}
.hero-grid{position:absolute;inset:0;z-index:0;background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);background-size:46px 46px;mask-image:radial-gradient(ellipse 70% 55% at 50% 35%,black 10%,transparent 75%);}
.hero-content{position:relative;z-index:2;max-width:780px;display:flex;flex-direction:column;align-items:center;}

/* STATUS PILL (badge) */
.status-pill{display:inline-flex;align-items:center;gap:9px;padding:9px 18px;border-radius:100px;font-size:13px;font-weight:500;background:var(--surface);border:1px solid var(--border);color:var(--muted);backdrop-filter:blur(10px);margin-bottom:34px;cursor:default;transition:border-color .3s var(--ease);}
.dot-pulse{width:7px;height:7px;border-radius:50%;background:#3ee07a;box-shadow:0 0 0 0 rgba(62,224,122,.6);animation:pulse 2s infinite;}
.dot-pulse.dot-yellow{background:#f5c842;box-shadow:0 0 0 0 rgba(245,200,66,.6);}
.dot-pulse.dot-red{background:#ff5f5f;box-shadow:0 0 0 0 rgba(255,95,95,.6);}
.dot-pulse.dot-blue{background:#5faeff;box-shadow:0 0 0 0 rgba(95,174,255,.6);}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(62,224,122,.55);}70%{box-shadow:0 0 0 8px rgba(62,224,122,0);}100%{box-shadow:0 0 0 0 rgba(62,224,122,0);}}

/* HERO PHOTO */
.hero-photo{position:relative;width:160px;height:160px;margin-bottom:32px;animation:floatAvatar 5s ease-in-out infinite;}
@keyframes floatAvatar{0%,100%{transform:translateY(0px);}50%{transform:translateY(-12px);}}
.hero-photo-glow{position:absolute;inset:-18px;border-radius:50%;background:radial-gradient(circle,rgba(0,227,255,.25) 0%,transparent 70%);animation:glowPulse 3s ease-in-out infinite;pointer-events:none;}
@keyframes glowPulse{0%,100%{opacity:.6;transform:scale(1);}50%{opacity:1;transform:scale(1.08);}}
.hero-photo-ring{position:absolute;inset:-4px;border-radius:50%;z-index:1;background:conic-gradient(from 0deg,var(--neon),var(--blue),#7c5cff,#ff4fa3,var(--neon));animation:rotateRing 4s linear infinite;}
.hero-photo-ring::before{content:'';position:absolute;inset:3px;border-radius:50%;background:var(--bg);z-index:0;}
@keyframes rotateRing{to{transform:rotate(360deg);}}
.hero-photo-inner{position:absolute;z-index:3;inset:4px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:36px;font-weight:700;letter-spacing:1px;background:radial-gradient(circle at 30% 25%,rgba(0,227,255,.3),transparent 55%),linear-gradient(160deg,#11151f,#0a0d16);overflow:hidden;}
.hero-photo-inner img{width:100%;height:100%;object-fit:cover;border-radius:50%;position:absolute;inset:0;z-index:2;}
.hero-photo-inner span{background:var(--gradient);-webkit-background-clip:text;background-clip:text;color:transparent;position:relative;z-index:1;filter:drop-shadow(0 0 8px rgba(0,227,255,.5));}
.hero-photo-inner::before{content:'';position:absolute;inset:0;border-radius:50%;background:linear-gradient(115deg,transparent 30%,rgba(255,255,255,.12) 50%,transparent 70%);animation:shimmerSweep 3.5s ease-in-out infinite;z-index:3;pointer-events:none;}
@keyframes shimmerSweep{0%{transform:translateX(-100%) rotate(45deg);}40%,100%{transform:translateX(200%) rotate(45deg);}}
.hero-photo-orbit{position:absolute;inset:-28px;border-radius:50%;pointer-events:none;animation:orbitSpin 8s linear infinite;}
.hero-photo-orbit-2{animation-duration:12s;animation-direction:reverse;}
@keyframes orbitSpin{to{transform:rotate(360deg);}}
.orbit-dot{position:absolute;width:8px;height:8px;border-radius:50%;background:var(--neon);box-shadow:0 0 8px var(--neon),0 0 16px rgba(0,227,255,.5);}
.orbit-dot-blue{background:var(--blue);box-shadow:0 0 8px var(--blue),0 0 16px rgba(59,109,255,.5);}
.orbit-dot:nth-child(1){top:0;left:50%;transform:translateX(-50%);}
.orbit-dot:nth-child(2){bottom:0;left:50%;transform:translateX(-50%);}
.orbit-dot-2-1{top:50%;right:0;transform:translateY(-50%);}
.orbit-dot-2-2{top:50%;left:0;transform:translateY(-50%);}

.eyebrow{font-family:var(--font-mono);font-size:14px;color:var(--neon);margin-bottom:14px;letter-spacing:1px;}
.hero-title{font-family:var(--font-display);font-weight:700;letter-spacing:-2px;font-size:clamp(40px,7.5vw,76px);line-height:1.05;margin-bottom:22px;}
.hero-type{font-family:var(--font-mono);font-size:clamp(16px,2.4vw,21px);margin-bottom:20px;display:flex;align-items:center;gap:9px;color:var(--muted);}
.hero-type-text{color:var(--neon);font-weight:600;}
.type-cursor{color:var(--neon);animation:blink 1s steps(1) infinite;font-weight:300;}
@keyframes blink{50%{opacity:0;}}
.hero-tagline{font-family:var(--font-display);font-size:clamp(17px,2vw,21px);font-weight:500;color:var(--white);opacity:.9;margin-bottom:38px;font-style:italic;}
.hero-actions{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-bottom:40px;}
.hero-meta{display:flex;align-items:center;gap:10px;font-size:13.5px;color:var(--muted-soft);}
.meta-sep{opacity:.5;}
.scroll-cue{position:absolute;bottom:34px;left:50%;transform:translateX(-50%);width:24px;height:38px;border:1.5px solid var(--border-strong);border-radius:14px;display:flex;justify-content:center;padding-top:7px;z-index:2;}
.scroll-cue span{width:3px;height:7px;border-radius:3px;background:var(--neon);animation:scrollCue 1.8s infinite;}
@keyframes scrollCue{0%{opacity:1;transform:translateY(0);}70%{opacity:0;transform:translateY(12px);}100%{opacity:0;}}

/* ABOUT */
.about-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:60px;align-items:start;}
.about-text p{color:var(--muted);margin-bottom:18px;font-size:16px;max-width:560px;}
.about-text em{color:var(--white);font-style:normal;font-weight:600;}
.about-info{margin-top:36px;display:flex;flex-direction:column;gap:22px;}
.info-row{display:flex;gap:18px;align-items:flex-start;}
.info-row i{width:42px;height:42px;flex-shrink:0;border-radius:12px;display:flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--border);color:var(--neon);font-size:16px;}
.info-row h4{font-family:var(--font-display);font-size:15.5px;margin-bottom:4px;}
.info-row p{color:var(--muted-soft);font-size:14px;margin:0;}
.about-cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:26px 22px;backdrop-filter:blur(14px);transition:border-color .35s var(--ease),transform .35s var(--ease);}
.stat-card:hover{border-color:var(--border-strong);transform:translateY(-4px);}
.stat-num{font-family:var(--font-display);font-size:38px;font-weight:700;display:block;background:var(--gradient);-webkit-background-clip:text;background-clip:text;color:transparent;}
.stat-label{font-size:13px;color:var(--muted-soft);}
.stat-card-wide{grid-column:1/-1;background:var(--gradient-soft);border-color:rgba(0,227,255,.25);}
.stat-card-wide i{color:var(--neon);font-size:18px;margin-bottom:10px;display:block;}
.stat-card-wide p{font-family:var(--font-display);font-size:15.5px;font-weight:500;line-height:1.5;}

/* SKILLS */
.skills-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:60px;align-items:start;}
.skill-item{margin-bottom:26px;}
.skill-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:14.5px;font-weight:600;}
.skill-head i{color:var(--neon);margin-right:8px;}
.skill-percent{font-family:var(--font-mono);color:var(--muted);}
.skill-track{height:8px;border-radius:100px;background:var(--surface);border:1px solid var(--border);overflow:hidden;}
.skill-fill{height:100%;width:0%;border-radius:100px;background:var(--gradient);box-shadow:0 0 12px rgba(0,227,255,.5);transition:width 1.4s var(--ease);}
.skills-side{display:flex;flex-direction:column;gap:20px;}
.tool-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:26px;backdrop-filter:blur(14px);}
.tool-card h3{font-family:var(--font-display);font-size:16px;margin-bottom:16px;display:flex;gap:10px;align-items:center;}
.tool-card h3 i{color:var(--neon);}
.tool-tags{display:flex;flex-wrap:wrap;gap:9px;}
.tool-tags span{font-size:12.5px;padding:7px 13px;border-radius:100px;border:1px solid var(--border);color:var(--muted);transition:border-color .3s var(--ease),color .3s var(--ease);}
.tool-tags span:hover{border-color:var(--neon);color:var(--neon);}

/* PORTFOLIO */
.portfolio-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
.project-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden;transition:transform .45s var(--ease),border-color .45s var(--ease),box-shadow .45s var(--ease);}
.project-card:hover{transform:translateY(-8px);border-color:var(--border-strong);box-shadow:0 24px 50px -20px rgba(0,227,255,.25);}
.project-thumb{height:190px;display:flex;align-items:center;justify-content:center;font-size:42px;color:rgba(255,255,255,.85);position:relative;overflow:hidden;}
.project-thumb::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(6,8,15,.55));}
.project-card:hover .project-thumb i{transform:scale(1.15) rotate(-4deg);}
.project-thumb i{transition:transform .5s var(--ease);position:relative;z-index:1;}
.thumb-1{background:linear-gradient(135deg,#ff5f6d,#7c1f6e);}
.thumb-2{background:linear-gradient(135deg,#00e3ff,#3b6dff);}
.thumb-3{background:linear-gradient(135deg,#7c5cff,#2c2470);}
.thumb-4{background:linear-gradient(135deg,#ffb347,#b3580e);}
.thumb-5{background:linear-gradient(135deg,#3ee07a,#1a7a3a);}
.thumb-6{background:linear-gradient(135deg,#ff4fa3,#7c1f50);}
.project-body{padding:22px;}
.project-body h3{font-family:var(--font-display);font-size:17px;margin-bottom:8px;}
.project-body p{font-size:14px;color:var(--muted);margin-bottom:16px;}
.project-tags{display:flex;gap:7px;flex-wrap:wrap;}
.project-tags span{font-size:12px;padding:4px 11px;border-radius:100px;background:rgba(0,227,255,.08);border:1px solid rgba(0,227,255,.2);color:var(--neon);}

/* CONTACT */
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:start;}
.contact-text p{color:var(--muted);margin-bottom:28px;font-size:16px;}
.contact-links{display:flex;flex-direction:column;gap:14px;}
.contact-link{display:flex;align-items:center;gap:16px;padding:18px 22px;border-radius:var(--radius-md);background:var(--surface);border:1px solid var(--border);transition:border-color .35s var(--ease),transform .35s var(--ease);}
.contact-link:hover{border-color:var(--border-strong);transform:translateX(6px);}
.contact-link i{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:var(--gradient-soft);border:1px solid rgba(0,227,255,.2);color:var(--neon);}
.contact-link-text span{display:block;font-size:12px;color:var(--muted-soft);margin-bottom:2px;}
.contact-link-text strong{font-size:14.5px;}
.form-group{margin-bottom:18px;}
.form-group label{display:block;font-size:13.5px;font-weight:600;margin-bottom:8px;color:var(--muted);}
.form-group input,.form-group textarea{width:100%;padding:14px 18px;border-radius:var(--radius-sm);background:var(--surface);border:1px solid var(--border);color:var(--white);font-family:var(--font-body);font-size:15px;transition:border-color .3s var(--ease);outline:none;resize:none;}
.form-group input:focus,.form-group textarea:focus{border-color:var(--neon);}
.form-group textarea{height:130px;}

/* FOOTER */
.footer{padding:50px 0;border-top:1px solid var(--border);position:relative;z-index:1;}
.footer-inner{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:18px;}
.footer-logo{font-family:var(--font-display);font-weight:700;font-size:18px;}
.footer-logo span{color:var(--neon);}
.footer-socials{display:flex;gap:14px;}
.footer-socials a{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);display:flex;align-items:center;justif
